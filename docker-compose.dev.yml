services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: pokemon-dex-dev
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    stdin_open: true
    tty: true

volumes:
  node_modules:
  next_cache:
