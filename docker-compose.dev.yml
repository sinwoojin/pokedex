services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: pokemon-web-dev
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      NEXT_PUBLIC_COMMUNITY_API_BASE_URL: http://localhost:4000/api
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    depends_on:
      - api
    stdin_open: true
    tty: true

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: pokemon-api-dev
    command: npm run dev
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      CLIENT_ORIGIN: http://localhost:5173
      ORACLE_ENABLED: "true"
      ORACLE_USER: pokemon_app
      ORACLE_PASSWORD: pokemon_app
      ORACLE_CONNECT_STRING: oracle:1521/FREEPDB1
      ORACLE_POOL_MIN: 1
      ORACLE_POOL_MAX: 10
      ORACLE_POOL_INCREMENT: 1
    volumes:
      - ./api:/app
      - api_node_modules:/app/node_modules
    depends_on:
      - oracle
    stdin_open: true
    tty: true

  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: pokemon-oracle-dev
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oracle_local_123
      APP_USER: pokemon_app
      APP_USER_PASSWORD: pokemon_app
    volumes:
      - ./api/db:/container-entrypoint-initdb.d
      - oracle_data:/opt/oracle/oradata

volumes:
  node_modules:
  next_cache:
  api_node_modules:
  oracle_data:
